<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Roulette Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        .casino-box {
            background: #2c2c2c;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        h2 { color: #f1c40f; margin: 0 0 5px 0; }
        
        .balance-box {
            font-size: 18px;
            margin: 10px 0;
            color: #2ecc71;
            font-weight: bold;
        }

        .roulette-container {
            position: relative;
            width: 100%;
            height: 60px;
            background: #111;
            border: 3px solid #f1c40f;
            border-radius: 8px;
            margin: 15px 0;
            overflow: hidden;
        }
        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #f1c40f;
            z-index: 10;
            box-shadow: 0 0 8px #f1c40f;
        }
        .tape {
            display: flex;
            width: max-content;
            height: 100%;
            transform: translateX(0);
        }
        .cell {
            width: 50px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            border-right: 1px solid #222;
        }
        .red { background: #e74c3c; }
        .black { background: #2c3e50; }
        .zero { background: #2ecc71; }

        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 2px solid #444;
            background: #111;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .bet-btn {
            flex: 1;
            padding: 12px 5px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .bet-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-red { background: #e74c3c; }
        .btn-black { background: #2c3e50; }
        .btn-zero { background: #2ecc71; }
    </style>
</head>
<body>

<div class="casino-box">
    <h2>🎰 РУЛЕТКА 🎰</h2>
    <div class="balance-box">💰 Баланс: <span id="balance-val">Загрузка...</span> ₴</div>
    
    <div class="roulette-container">
        <div class="pointer"></div>
        <div class="tape" id="roulette-tape"></div>
    </div>

    <input type="number" id="bet-amount" value="100" min="10">

    <div class="btn-group">
        <button class="bet-btn btn-red" id="b-red" onclick="startSpin('red')">Красное x2</button>
        <button class="bet-btn btn-black" id="b-black" onclick="startSpin('black')">Черное x2</button>
        <button class="bet-btn btn-zero" id="b-zero" onclick="startSpin('zero')">Зеро x35</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ⚠️ ВПИШИ СЮДА СВОЙ URL ОТ NGROK ИЛИ СЕРВЕРА (ОБЯЗАТЕЛЬНО С HTTPS)
    const API_URL = "https://ССЫЛКА_НА_ТВОЙ_СЕРВЕР.ngrok-free.app"; 
    
    const currentUserId = tg.initDataUnsafe?.user?.id || 6252715941; // дефолт для тестов

    const order = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const RED_NUMBERS = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    const tape = document.getElementById('roulette-tape');
    const cellWidth = 51; 

    // Строим ленту рулетки
    let totalCells = [];
    for (let i = 0; i < 15; i++) { totalCells = totalCells.concat(order); }
    totalCells.forEach(num => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (num === 0) cell.classList.add('zero');
        else if (RED_NUMBERS.includes(num)) cell.classList.add('red');
        else cell.classList.add('black');
        cell.innerText = num;
        tape.appendChild(cell);
    });

    // Загрузка баланса при входе
    function loadBalance() {
        fetch(`${API_URL}/api/get_profile?user_id=${currentUserId}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('balance-val').innerText = data.balance;
            })
            .catch(e => console.error("Ошибка сети:", e));
    }
    loadBalance();

    function startSpin(betType) {
        const amount = parseInt(document.getElementById('bet-amount').value);
        if (isNaN(amount) || amount <= 0) { alert('Введите корректную ставку!'); return; }
    
        // Блокируем интерфейс
        document.querySelectorAll('.bet-btn').forEach(b => b.disabled = true);
    
        // Отправляем ставку на бэкенд
        fetch(`${API_URL}/api/spin`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: currentUserId,
                bet_amount: amount,
                bet_type: betType
            })
        })
        .then(res => {
            if (!res.ok) throw new Error("Ошибка баланса или сервера");
            return res.json();
        })
        .then(data => {
            // Сбрасываем ленту в дефолтное положение для нового прокрута без рывков
            tape.style.transition = 'none';
            tape.style.transform = `translateX(0px)`;
            
            // Заставляем браузер применить сброс стилей
            tape.offsetHeight; 

            // Считаем точку назначения (в районе 8-го круга)
            const targetIndex = order.indexOf(data.winningNumber) + (37 * 8); 
            const containerWidth = document.querySelector('.roulette-container').offsetWidth;
            const targetX = -(targetIndex * cellWidth - containerWidth / 2 + cellWidth / 2);
        
            // Запуск плавной анимации
            tape.style.transition = 'transform 4.5s cubic-bezier(0.1, 1, 0.1, 1)';
            tape.style.transform = `translateX(${targetX}px)`;
        
            setTimeout(() => {
                // Обновляем баланс прямо на экране по окончании кручения
                document.getElementById('balance-val').innerText = data.newBalance;
                
                // Включаем кнопки для следующего спина! Окно не закрылось!
                document.querySelectorAll('.bet-btn').forEach(b => b.disabled = false);
            }, 4700);
        })
        .catch(err => {
            alert("Ошибка: Недостаточно средств или сервер отключен!");
            document.querySelectorAll('.bet-btn').forEach(b => b.disabled = false);
        });
    }
</script>
</body>
</html>
